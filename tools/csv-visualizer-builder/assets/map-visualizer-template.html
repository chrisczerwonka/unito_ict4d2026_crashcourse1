<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSV Visualizer | FloodKit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
  <style>
    :root {
      --primary: #0d9488;
      --primary-hover: #0f766e;
      --bg: #ffffff;
      --bg-card: #ffffff;
      --bg-muted: #f8fafc;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --map-bg: #e8f4f8;
    }
    
    :root.dark {
      --bg: #0f172a;
      --bg-card: #1e293b;
      --bg-muted: #0f172a;
      --border: #334155;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --map-bg: #1a1a2e;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    /* Consistent Navigation Bar */
    .nav-container {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 1000;
    }

    nav {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0.75rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      font-weight: 800;
      font-size: 1.25rem;
      color: var(--primary);
      text-decoration: none;
      letter-spacing: -0.025em;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text);
      font-size: 0.875rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--primary); }
    .nav-links a.active { color: var(--primary); font-weight: 600; }

    /* Upload Screen */
    .upload-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-y: auto;
    }
    
    .upload-screen h1 {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      letter-spacing: -0.05em;
    }
    
    .subtitle {
      color: var(--text-muted);
      margin-bottom: 3rem;
    }
    
    .upload-container {
      width: 100%;
      max-width: 32rem;
      background: var(--bg-card);
      border-radius: 1rem;
      padding: 2rem;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      border: 1px solid var(--border);
    }
    
    .dropzone {
      border: 2px dashed var(--border);
      border-radius: 0.75rem;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    
    .dropzone:hover, .dropzone.dragging {
      border-color: var(--primary);
      background: rgba(13, 148, 136, 0.05);
    }
    
    .dropzone input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    
    .dropzone-icon {
      width: 3rem;
      height: 3rem;
      margin: 0 auto 1rem;
      color: var(--primary);
    }
    
    .dropzone-title {
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    
    .dropzone-subtitle {
      font-size: 0.875rem;
      color: var(--text-muted);
    }
    
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      color: var(--text-muted);
      font-size: 0.875rem;
    }
    
    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    
    .button-row {
      display: flex;
      gap: 1rem;
    }
    
    .btn-primary, .btn-secondary, .btn-ghost {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
    }
    
    .btn-primary {
      background: var(--primary);
      color: white;
    }
    
    .btn-primary:hover { background: var(--primary-hover); }
    
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .btn-secondary {
      background: var(--bg-muted);
      border-color: var(--border);
      color: var(--text);
    }
    
    .btn-secondary:hover {
      background: var(--border);
    }
    
    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
    }
    
    .btn-ghost:hover {
      color: var(--text);
    }
    
    .paste-area {
      display: none;
      margin-top: 1.5rem;
    }
    
    .paste-area.visible {
      display: block;
    }
    
    textarea {
      width: 100%;
      height: 12rem;
      padding: 1rem;
      border-radius: 0.5rem;
      background: var(--bg-muted);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: monospace;
      font-size: 0.875rem;
      resize: none;
      margin-bottom: 1rem;
    }
    
    textarea:focus {
      outline: none;
      border-color: var(--primary);
    }
    
    .paste-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 0.75rem;
    }
    
    .help-text {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: 2rem;
    }
    
    /* Map Screen */
    .map-screen {
      display: none;
      flex: 1;
      overflow: hidden;
    }
    
    .map-screen.visible {
      display: flex;
    }
    
    .sidebar {
      width: 22rem;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .sidebar-header {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }
    
    .sidebar-header h2 {
      font-size: 0.875rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    
    .btn-reset {
      padding: 0.375rem 0.75rem;
      font-size: 0.75rem;
      background: var(--bg-muted);
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-reset:hover { border-color: var(--primary); }
    
    .filters-panel {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    
    .filters-title {
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
    }
    
    .filter-row {
      display: flex;
      gap: 0.75rem;
    }
    
    .filter-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
    }
    
    .filter-label {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-muted);
    }
    
    .filter-select, .filter-input {
      width: 100%;
      padding: 0.5rem;
      font-size: 0.8125rem;
      background: var(--bg-muted);
      border: 1px solid var(--border);
      border-radius: 0.375rem;
      color: var(--text);
    }
    
    .data-table-container {
      flex: 1;
      overflow: auto;
    }
    
    .data-table {
      width: 100%;
      font-size: 0.75rem;
      border-collapse: collapse;
    }
    
    .data-table th {
      position: sticky;
      top: 0;
      background: var(--bg-muted);
      padding: 0.75rem;
      text-align: left;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }
    
    .data-table td {
      padding: 0.625rem 0.75rem;
      border-bottom: 1px solid var(--border);
      max-width: 8rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .data-table tr:hover { background: var(--bg-muted); cursor: pointer; }
    .data-table tr.selected { background: rgba(13, 148, 136, 0.1); }
    
    .map-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    
    #map { flex: 1; z-index: 1; }
    
    .detail-panel {
      display: none;
      padding: 1.25rem;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      max-height: 12rem;
      overflow-y: auto;
      z-index: 10;
    }
    
    .detail-panel.visible { display: block; }
    
    .theme-toggle {
      position: absolute;
      top: 1rem;
      right: 1rem;
      z-index: 1000;
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 0.5rem;
      border-radius: 0.5rem;
      cursor: pointer;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 4px rgb(0 0 0 / 0.1);
    }

    /* Marker Cluster Styling */
    .marker-cluster-small { background-color: rgba(13, 148, 136, 0.4); }
    .marker-cluster-small div { background-color: rgba(13, 148, 136, 0.8); color: white; }
    .marker-cluster-medium { background-color: rgba(20, 184, 166, 0.4); }
    .marker-cluster-medium div { background-color: rgba(20, 184, 166, 0.8); color: white; }
    .marker-cluster-large { background-color: rgba(15, 118, 110, 0.4); }
    .marker-cluster-large div { background-color: rgba(15, 118, 110, 0.8); color: white; }
  </style>
</head>
<body>

  <div class="nav-container">
    <nav>
      <a href="index.html" class="brand">FloodKit</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="bangladesh_maps/flood-incidence-and-risk-across-priority-districts.html">Map</a>
        <a href="flood_analytics.html">Charts</a>
        <a href="map-visualizer.html" class="active">CSV App</a>
      </div>
    </nav>
  </div>

  <!-- Upload Screen -->
  <div class="upload-screen" id="uploadScreen">
    <h1>CSV Data Visualizer</h1>
    <p class="subtitle">Instantly map any geographic dataset with coordinates</p>
    
    <div class="upload-container">
      <div class="dropzone" id="dropzone">
        <input type="file" accept=".csv,.tsv,.txt" id="fileInput" />
        <div class="dropzone-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
          </svg>
        </div>
        <p class="dropzone-title">Drop CSV file here</p>
        <p class="dropzone-subtitle">or click to browse your files</p>
      </div>
      
      <div class="divider">
        <div class="divider-line"></div>
        <span>OR</span>
        <div class="divider-line"></div>
      </div>
      
      <div class="button-row">
        <button class="btn-secondary" id="pasteBtn">Paste CSV Text</button>
        <button class="btn-secondary" id="exampleBtn">Load Sample Data</button>

      <div class="paste-area" id="pasteArea">
        <textarea id="pasteTextarea" placeholder="Paste CSV/TSV data here..."></textarea>
        <div class="paste-buttons">
          <button class="btn-ghost" id="cancelPaste">Cancel</button>

        </div>
      </div>

        Requires columns for latitude and longitude (e.g., lat, lng, x, y).
      </p>

  </div>
  
  <!-- Map Screen -->
  <div class="map-screen" id="mapScreen">
    <div class="sidebar">
      <div class="sidebar-header">
        <h2 id="datasetName">Dataset</h2>
        <button class="btn-reset" id="resetBtn">New data</button>
      </div>
      
      <div class="filters-panel">
        <div class="filters-title">Filters</div>
        <div class="filter-row">
          <div class="filter-group">
            <label class="filter-label">Country</label>
            <select class="filter-select" id="countryFilter">
              <option value="">All</option>
            </select>
          </div>
          <div class="filter-group">
            <label class="filter-label">Event</label>
            <select class="filter-select" id="eventFilter">
              <option value="">All</option>
            </select>
          </div>
        </div>
        <div class="filter-row">
            <div class="filter-group">
                <label class="filter-label">From</label>
                <input type="date" class="filter-input" id="dateFrom">
            </div>
            <div class="filter-group">
                <label class="filter-label">To</label>
                <input type="date" class="filter-input" id="dateTo">
            </div>
        </div>
        <div style="font-size: 0.75rem; color: var(--text-muted); padding-top: 0.5rem;" id="filterStats"></div>
      </div>
      
      <div class="data-table-container">
        <table class="data-table">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
    
    <div class="map-container">
      <button class="theme-toggle" id="themeToggle" title="Toggle Theme">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <div id="map"></div>
      <div class="detail-panel" id="detailPanel">
        <h3 style="font-size: 0.875rem; margin-bottom: 0.75rem; font-weight: 700;">Record Details</h3>
        <div id="detailGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 0.5rem;"></div>
      </div>
    </div>

  <script>
    // Column detection patterns
    const LAT_COLUMNS = ["lat", "latitude", "y", "lat_coord"];
    const LNG_COLUMNS = ["lng", "lon", "long", "longitude", "x", "lng_coord", "lon_coord"];
    const LABEL_COLUMNS = ["name", "title", "label", "country", "location", "city", "place", "event", "maincause", "cause", "description"];
    const SEVERITY_COLUMNS = ["severity", "magnitude", "intensity", "level", "scale", "dead", "casualties"];
    const COUNTRY_COLUMNS = ["country", "nation", "state", "region", "territory"];
    const EVENT_COLUMNS = ["event", "type", "cause", "maincause", "main_cause", "categorised_cause", "category", "event_type"];
    const DATE_COLUMNS = ["date", "began", "started", "start_date", "begin_date", "event_date", "occurred"];

    // Example data
    const EXAMPLE_DATA = `ID,Country,City,Latitude,Longitude,Event,Began,Ended,Dead,Displaced,MainCause,Severity
1,Mozambique,Beira,-19.8436,34.8389,Cyclone Idai,2019-03-14,2019-03-21,603,1850000,Tropical Cyclone,3
2,Germany,Ahrweiler,50.5404,7.1178,River Flooding,2021-07-14,2021-07-15,184,42000,Extreme Rain,3
3,Pakistan,Karachi,24.8607,67.0011,Flash Floods,2020-08-25,2020-08-28,41,500000,Monsoon,2
4,Bangladesh,Dhaka,23.8103,90.4125,Seasonal Flooding,2020-07-01,2020-07-31,257,5400000,Monsoon,2.5
5,USA,Houston,29.7604,-95.3698,Hurricane Harvey,2017-08-25,2017-08-30,68,30000,Hurricane,2.5`;

    // State
    let map = null;
    let markerClusterGroup = null;
    let allData = [];
    let filteredData = [];
    let columns = [];
    let selectedIndex = -1;

    // DOM Elements
    const uploadScreen = document.getElementById('uploadScreen');
    const mapScreen = document.getElementById('mapScreen');
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const pasteBtn = document.getElementById('pasteBtn');
    const exampleBtn = document.getElementById('exampleBtn');
    const pasteArea = document.getElementById('pasteArea');
    const pasteTextarea = document.getElementById('pasteTextarea');
    const cancelPaste = document.getElementById('cancelPaste');
    const submitPaste = document.getElementById('submitPaste');
    const resetBtn = document.getElementById('resetBtn');
    const datasetName = document.getElementById('datasetName');
    const tableHead = document.getElementById('tableHead');
    const tableBody = document.getElementById('tableBody');
    const detailPanel = document.getElementById('detailPanel');
    const detailGrid = document.getElementById('detailGrid');
    const countryFilter = document.getElementById('countryFilter');
    const eventFilter = document.getElementById('eventFilter');
    const filterStats = document.getElementById('filterStats');
    const themeToggle = document.getElementById('themeToggle');

    themeToggle.addEventListener('click', () => {
        document.documentElement.classList.toggle('dark');
        if (map) initMap(); // Refresh tiles
    });

    function detectDelimiter(text) {
      const firstLine = text.split('\n')[0];
      const delimiters = [',', '\t', ';', '|'];
      let maxCount = 0;
      let detected = ',';
      for (const d of delimiters) {
        const count = (firstLine.match(new RegExp(d === '|' ? '\\|' : d, 'g')) || []).length;
        if (count > maxCount) { maxCount = count; detected = d; }
      }
      return detected;
    }

    function findColumn(headers, patterns) {
      const lower = headers.map(h => h.toLowerCase().trim());
      for (const pattern of patterns) {
        const idx = lower.indexOf(pattern);
        if (idx !== -1) return headers[idx];
      }
      return null;
    }

    function parseData(content) {
      const delimiter = detectDelimiter(content);
      const lines = content.trim().split('\n').filter(l => l.trim());
      if (lines.length < 2) return { data: [], columns: [] };
      
      const headers = lines[0].split(delimiter).map(h => h.trim().replace(/^["']|["']$/g, ''));
      const latCol = findColumn(headers, LAT_COLUMNS);
      const lngCol = findColumn(headers, LNG_COLUMNS);
      const labelCol = findColumn(headers, LABEL_COLUMNS);
      const severityCol = findColumn(headers, SEVERITY_COLUMNS);
      
      if (!latCol || !lngCol) {
        alert('Missing Latitude/Longitude columns.');
        return { data: [], columns: [] };
      }
      
      const parsed = [];
      for (let i = 1; i < lines.length; i++) {
        const values = lines[i].split(delimiter).map(v => v.trim().replace(/^["']|["']$/g, ''));
        if (values.length !== headers.length) continue;
        const row = {};
        headers.forEach((h, idx) => row[h] = values[idx]);
        row._lat = parseFloat(row[latCol]);
        row._lng = parseFloat(row[lngCol]);
        if (isNaN(row._lat) || isNaN(row._lng)) continue;
        row._label = labelCol ? row[labelCol] : `Point ${i}`;
        row._severity = severityCol ? parseFloat(row[severityCol]) || 1 : 1;
        row._country = findColumn(headers, COUNTRY_COLUMNS) ? row[findColumn(headers, COUNTRY_COLUMNS)] : null;
        row._event = findColumn(headers, EVENT_COLUMNS) ? row[findColumn(headers, EVENT_COLUMNS)] : null;
        parsed.push(row);
      }
      return { data: parsed, columns: headers };
    }

    function initMap() {
      if (map) map.remove();
      map = L.map('map').setView([20, 0], 2);
      const isDark = document.documentElement.classList.contains('dark');
      const tileUrl = isDark 
        ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
        : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
      L.tileLayer(tileUrl, { attribution: '&copy; CARTO' }).addTo(map);
      markerClusterGroup = L.markerClusterGroup();
      map.addLayer(markerClusterGroup);
    }

    function loadData(content, name) {
      const result = parseData(content);
      if (result.data.length === 0) return;
      allData = result.data;
      filteredData = [...allData];
      columns = result.columns;
      uploadScreen.style.display = 'none';
      mapScreen.classList.add('visible');
      datasetName.textContent = name;
      initMap();
      renderMarkers();
      renderTable();
      populateFilters();
    }

    function renderMarkers() {
      markerClusterGroup.clearLayers();
      filteredData.forEach((row, idx) => {
        const marker = L.circleMarker([row._lat, row._lng], {
          radius: 8,
          fillColor: '#0d9488',
          color: '#fff',
          weight: 1,
          opacity: 1,
          fillOpacity: 0.8
        }).bindPopup(row._label);
        marker.on('click', () => selectRow(idx));
        markerClusterGroup.addLayer(marker);
      });
      if (filteredData.length > 0) {
          map.fitBounds(markerClusterGroup.getBounds());
      }
    }

    function renderTable() {
      const displayCols = columns.slice(0, 3);
      tableHead.innerHTML = `<tr>${displayCols.map(c => `<th>${c}</th>`).join('')}</tr>`;
      tableBody.innerHTML = filteredData.map((row, idx) => 
        `<tr data-idx="${idx}">${displayCols.map(c => `<td>${row[c] || ''}</td>`).join('')}</tr>`
      ).join('');
      tableBody.querySelectorAll('tr').forEach(tr => {
        tr.onclick = () => selectRow(parseInt(tr.dataset.idx));
      });
    }

    function selectRow(idx) {
      const row = filteredData[idx];
      map.flyTo([row._lat, row._lng], 10);
      detailPanel.classList.add('visible');
      detailGrid.innerHTML = columns.map(c => `<div style="font-size: 0.75rem;"><strong style="color: var(--text-muted);">${c}:</strong> ${row[c] || '-'}</div>`).join('');
      tableBody.querySelectorAll('tr').forEach((tr, i) => tr.classList.toggle('selected', i === idx));
    }

    function populateFilters() {
        const countries = [...new Set(allData.map(d => d._country).filter(Boolean))].sort();
        countryFilter.innerHTML = '<option value="">All</option>' + countries.map(c => `<option value="${c}">${c}</option>`).join('');
        const events = [...new Set(allData.map(d => d._event).filter(Boolean))].sort();
        eventFilter.innerHTML = '<option value="">All</option>' + events.map(e => `<option value="${e}">${e}</option>`).join('');
    }

    function applyFilters() {
        const c = countryFilter.value;
        const e = eventFilter.value;
        filteredData = allData.filter(d => (!c || d._country === c) && (!e || d._event === e));
        filterStats.textContent = `Showing ${filteredData.length} records`;
        renderMarkers();
        renderTable();
    }

    countryFilter.onchange = applyFilters;
    eventFilter.onchange = applyFilters;
    resetBtn.onclick = () => location.reload();
    dropzone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => {
        const f = e.target.files[0];
        if (f) {
            const r = new FileReader();
            r.onload = (ev) => loadData(ev.target.result, f.name);
            r.readAsText(f);
        }
    };
    pasteBtn.onclick = () => pasteArea.classList.toggle('visible');
    pasteTextarea.oninput = () => submitPaste.disabled = !pasteTextarea.value.trim();
    submitPaste.onclick = () => loadData(pasteTextarea.value, "Pasted Data");
    exampleBtn.onclick = () => loadData(EXAMPLE_DATA, "Sample Data");
  </script>
</body>
</html>
