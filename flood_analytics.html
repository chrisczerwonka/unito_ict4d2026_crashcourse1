<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Flood Analytics</title>
    <!-- We're using Chart.js for charts and Papa Parse to read the CSV file -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        /* This creates the grid layout for our cards */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        /* Style for each individual chart card */
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card h3 {
            margin-top: 0;
            color: #2c3e50;
            font-size: 1.2rem;
            text-align: center;
        }
        .chart-container {
            position: relative;
            width: 100%;
            height: 300px;
        }
        .loading {
            text-align: center;
            font-size: 1.5rem;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Global Flood Archive Analytics</h1>
        <p>A visual summary of global flood events (1985 - Present)</p>
    </header>

    <div id="loading" class="loading">Loading data and generating charts...</div>

    <div class="dashboard" id="dashboard" style="display: none;">
        <!-- Card 1: Top 20 Countries -->
        <div class="card">
            <h3>Top 20 Countries by Flood Events</h3>
            <div class="chart-container">
                <canvas id="chartCountry"></canvas>
            </div>
        </div>

        <!-- Card 2: Events per Year -->
        <div class="card">
            <h3>Flood Events per Year</h3>
            <div class="chart-container">
                <canvas id="chartYear"></canvas>
            </div>
        </div>

        <!-- Card 3: Events by Category -->
        <div class="card">
            <h3>Flood Events by Category</h3>
            <div class="chart-container">
                <canvas id="chartCategory"></canvas>
            </div>
        </div>

        <!-- Card 4: Total Displaced by Severity -->
        <div class="card">
            <h3>Total People Displaced by Severity</h3>
            <div class="chart-container">
                <canvas id="chartSeverity"></canvas>
            </div>
        </div>
    </div>

    <script>
        // 1. Tell the browser where to find your CSV file
        const csvUrl = 'floodarchive_cleaned.csv';

        // 2. Use Papa Parse to read the file
        Papa.parse(csvUrl, {
            download: true,
            header: true,
            dynamicTyping: true,
            complete: function(results) {
                const data = results.data.filter(row => row.Country); // Filter out empty rows
                processData(data);
            }
        });

        function processData(data) {
            // Hide loading message and show dashboard
            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboard').style.display = 'grid';

            // --- DATA PROCESSING ---

            // (1) Country Counts
            const countryCounts = {};
            data.forEach(row => {
                countryCounts[row.Country] = (countryCounts[row.Country] || 0) + 1;
            });
            const top20Countries = Object.entries(countryCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 20);

            // (2) Year Counts
            const yearCounts = {};
            data.forEach(row => {
                if (row.Year) yearCounts[row.Year] = (yearCounts[row.Year] || 0) + 1;
            });
            const sortedYears = Object.keys(yearCounts).sort();

            // (3) Category Counts
            const categoryCounts = {};
            data.forEach(row => {
                const cat = row.categorised_reason || 'Unknown';
                categoryCounts[cat] = (categoryCounts[cat] || 0) + 1;
            });

            // (4) Displaced by Severity
            const severityDisplaced = {};
            data.forEach(row => {
                const sev = row.Severity || 'Unknown';
                const disp = row.Displaced || 0;
                severityDisplaced[sev] = (severityDisplaced[sev] || 0) + disp;
            });
            const sortedSeverities = Object.keys(severityDisplaced).sort();

            // --- CHART CREATION ---

            // Chart 1: Countries (Bar)
            new Chart(document.getElementById('chartCountry'), {
                type: 'bar',
                data: {
                    labels: top20Countries.map(c => c[0]),
                    datasets: [{
                        label: 'Number of Events',
                        data: top20Countries.map(c => c[1]),
                        backgroundColor: '#3498db'
                    }]
                },
                options: { maintainAspectRatio: false }
            });

            // Chart 2: Years (Line)
            new Chart(document.getElementById('chartYear'), {
                type: 'line',
                data: {
                    labels: sortedYears,
                    datasets: [{
                        label: 'Events per Year',
                        data: sortedYears.map(y => yearCounts[y]),
                        borderColor: '#e67e22',
                        fill: false,
                        tension: 0.1
                    }]
                },
                options: { maintainAspectRatio: false }
            });

            // Chart 3: Category (Bar)
            new Chart(document.getElementById('chartCategory'), {
                type: 'bar',
                data: {
                    labels: Object.keys(categoryCounts),
                    datasets: [{
                        label: 'Events by Reason',
                        data: Object.values(categoryCounts),
                        backgroundColor: '#2ecc71'
                    }]
                },
                options: { 
                    indexAxis: 'y', // Makes it a horizontal bar chart
                    maintainAspectRatio: false 
                }
            });

            // Chart 4: Severity (Bar)
            new Chart(document.getElementById('chartSeverity'), {
                type: 'bar',
                data: {
                    labels: sortedSeverities,
                    datasets: [{
                        label: 'Total Displaced',
                        data: sortedSeverities.map(s => severityDisplaced[s]),
                        backgroundColor: '#e74c3c'
                    }]
                },
                options: { maintainAspectRatio: false }
            });
        }
    </script>
</body>
</html>
