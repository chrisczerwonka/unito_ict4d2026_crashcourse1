<!DOCTYPE html>
<html>
<head>
    <title>Bangladesh Flood Analysis - Priority Districts</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; background: #f0f0f0; }
        .info { padding: 6px 8px; font: 14px/16px Arial, Helvetica, sans-serif; background: white; background: rgba(255,255,255,0.9); box-shadow: 0 0 15px rgba(0,0,0,0.2); border-radius: 5px; }
        .legend { line-height: 18px; color: #333; background: white; padding: 10px; border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.2); }
        .legend i { width: 18px; height: 18px; float: left; margin-right: 8px; opacity: 0.8; border: 1px solid #999; }
        .leaflet-tooltip { background: transparent; border: none; box-shadow: none; font-weight: bold; font-size: 14px; text-shadow: 1px 1px 2px white, -1px -1px 2px white; }
        .capital-label { color: #d73027; font-size: 16px; font-weight: 900 !important; }
        .map-title { padding: 10px 15px; font: bold 18px Arial, Helvetica, sans-serif; background: white; background: rgba(255,255,255,0.9); box-shadow: 0 0 15px rgba(0,0,0,0.2); border-radius: 5px; text-align: center; max-width: 500px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([23.6850, 90.3563], 7);

        // --- BASE LAYERS ---
        var normal = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CARTO'
        }).addTo(map);

        var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri World Imagery'
        });

        var terrain = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
            attribution: 'OpenTopoMap'
        });

        // --- OVERLAY PANES ---
        map.createPane('maskPane');
        map.getPane('maskPane').style.zIndex = 300;
        map.createPane('priorityPane');
        map.getPane('priorityPane').style.zIndex = 400;
        map.createPane('floodPane');
        map.getPane('floodPane').style.zIndex = 650;

        // --- TITLE OVERLAY ---
        var title = L.control({position: 'topright'});
        title.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'map-title');
            div.innerHTML = 'Bangladesh flood incidence and risk across the districts of Chattogram, Feni, Cumilla, Munshiganj, Tangail, and Narshingdi';
            return div;
        };
        title.addTo(map);

        // --- LAYER GROUPS ---
        var boundaryLayer = L.layerGroup().addTo(map);
        
        // Priority districts mapping
        var priorityMapping = {
            "Chittagong": "Chattogram",
            "Feni": "Feni",
            "Comilla": "Cumilla",
            "Munshiganj": "Munshiganj",
            "Tangail": "Tangail",
            "Narsingdi": "Narshingdi"
        };
        var reverseMapping = {
            "Chattogram": "Chittagong",
            "Feni": "Feni",
            "Cumilla": "Comilla",
            "Munshiganj": "Munshiganj",
            "Tangail": "Tangail",
            "Narshingdi": "Narsingdi"
        };

        var districtGroups = {};
        Object.keys(reverseMapping).forEach(function(d) {
            districtGroups[d] = L.layerGroup().addTo(map);
        });
        var otherDistrictsGroup = L.layerGroup().addTo(map);

        // --- WORLD MASK ---
        fetch('../world_mask.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    pane: 'maskPane',
                    style: { fillColor: '#808080', color: 'none', fillOpacity: 0.25, interactive: false }
                }).addTo(map);
            });

        // --- BANGLADESH BOUNDARY ---
        fetch('../bd_boundary.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { fillColor: '#a1d99b', color: '#31a354', weight: 2, fillOpacity: 0.1, interactive: false }
                }).addTo(boundaryLayer);
            });

        // --- DHAKA CAPITAL MARKER ---
        var dhakaIcon = L.divIcon({ className: 'leaflet-tooltip capital-label', html: '★ DHAKA' });
        L.marker([23.8103, 90.4125], { icon: dhakaIcon, interactive: false }).addTo(map);

        // --- LAYER CONTROL ---
        var baseMaps = { "Normal View": normal, "Satellite View": satellite, "Terrain View": terrain };
        var overlays = {
            "<b>Country Boundary</b>": boundaryLayer
        };
        
        var layerControl = L.control.layers(baseMaps, overlays, { collapsed: false, position: 'topleft' }).addTo(map);

        // Add district groups to control
        Object.keys(districtGroups).forEach(function(d) {
            layerControl.addOverlay(districtGroups[d], "District: " + d);
        });
        layerControl.addOverlay(otherDistrictsGroup, "All other districts");

        // --- PRIORITY DISTRICT POLYGONS ---
        fetch('../priority_districts.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    pane: 'priorityPane',
                    style: { fillColor: '#ff7800', weight: 2, color: '#fff', fillOpacity: 0.4 },
                    onEachFeature: function(feature, layer) {
                        var rawName = feature.properties.ADM2_EN;
                        var displayName = priorityMapping[rawName] || rawName;
                        var group = districtGroups[displayName] || otherDistrictsGroup;
                        
                        // Add label
                        var center = layer.getBounds().getCenter();
                        L.marker(center, {
                            icon: L.divIcon({ className: 'leaflet-tooltip', html: '<b>' + displayName + '</b>' }),
                            interactive: false
                        }).addTo(group);
                        
                        layer.addTo(group);
                        layer.bindPopup("<b>Priority District:</b> " + displayName);
                    }
                });
            });

        // --- FLOOD EVENTS (Categorized by District) ---
        fetch('../bangladesh_floods.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    pane: 'floodPane',
                    pointToLayer: function (feature, latlng) {
                        var sev = feature.properties.Severity;
                        var color = sev >= 2 ? "#d73027" : (sev >= 1.5 ? "#fc8d59" : "#fee08b");
                        var radius = sev >= 2 ? 10 : (sev >= 1.5 ? 8 : 6);
                        
                        var marker = L.circleMarker(latlng, {
                            radius: radius, fillColor: color, color: "#fff", weight: 1.5, fillOpacity: 1
                        });

                        var rawName = feature.properties.ADM2_EN;
                        var displayName = priorityMapping[rawName];
                        var group = displayName ? districtGroups[displayName] : otherDistrictsGroup;
                        
                        marker.addTo(group);
                        return marker;
                    },
                    onEachFeature: function(feature, layer) {
                        var p = feature.properties;
                        layer.bindPopup("<b>Flood Event</b><br>District: " + (priorityMapping[p.ADM2_EN] || p.ADM2_EN) + "<br>Cause: "+p.MainCause+"<br>Severity: "+p.Severity+"<br>Began: "+p.Began);
                    }
                });
            });

        // --- LEGEND ---
        var legend = L.control({position: 'bottomright'});
        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'info legend');
            div.innerHTML += '<b>Severity Legend</b><br>';
            div.innerHTML += '<i style="background:#d73027"></i> High (2.0)<br>';
            div.innerHTML += '<i style="background:#fc8d59"></i> Moderate (1.5)<br>';
            div.innerHTML += '<i style="background:#fee08b"></i> Low (1.0)<br>';
            div.innerHTML += '<hr><i style="background:#ff7800"></i> Priority District<br>';
            div.innerHTML += '<span style="color:#d73027">★</span> Capital (Dhaka)';
            return div;
        };
        legend.addTo(map);

    </script>
</body>
</html>
