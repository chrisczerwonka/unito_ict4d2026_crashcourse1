<!DOCTYPE html>
<html>
<head>
    <title>Bangladesh Flood Analysis - Priority Districts</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; background: #f0f0f0; }
        .info { padding: 6px 8px; font: 14px/16px Arial, Helvetica, sans-serif; background: white; background: rgba(255,255,255,0.9); box-shadow: 0 0 15px rgba(0,0,0,0.2); border-radius: 5px; }
        .leaflet-tooltip { background: transparent; border: none; box-shadow: none; font-weight: bold; font-size: 14px; text-shadow: 1px 1px 2px white, -1px -1px 2px white; }
        .capital-label { color: #d73027; font-size: 16px; font-weight: 900 !important; }
        .map-title { padding: 10px 15px; font: bold 18px Arial, Helvetica, sans-serif; background: white; background: rgba(255,255,255,0.9); box-shadow: 0 0 15px rgba(0,0,0,0.2); border-radius: 5px; text-align: center; max-width: 500px; }
        .zoom-icon { cursor: pointer; margin-left: 8px; font-size: 14px; vertical-align: middle; display: inline-block; padding: 2px 5px; background: #eee; border-radius: 3px; border: 1px solid #ccc; }
        .zoom-icon:hover { background: #ddd; }
        
        /* Consolidated Control Styling */
        .unified-control { max-height: 85vh; overflow-y: auto; width: 280px; }
        .unified-control b { display: block; margin-top: 10px; border-bottom: 1px solid #ccc; padding-bottom: 3px; }
        .unified-control .legend-item { line-height: 18px; color: #333; margin-top: 5px; }
        .unified-control .legend-item i { width: 18px; height: 18px; float: left; margin-right: 8px; opacity: 0.8; border: 1px solid #999; }
        .district-row { display: flex; align-items: center; justify-content: space-between; margin-top: 5px; padding: 2px 0; }
        .district-name { font-size: 13px; color: #333; }
        .reset-btn { width: 100%; margin-top: 10px; padding: 5px; cursor: pointer; background: #fff; border: 1px solid #ccc; border-radius: 3px; font-weight: bold; }
        .reset-btn:hover { background: #f0f0f0; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script>
        var initialView = [23.6850, 90.3563];
        var initialZoom = 7;
        var map = L.map('map').setView(initialView, initialZoom);

        // --- BASE LAYERS ---
        var base = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        }).addTo(map);

        // --- OVERLAY PANES ---
        // Order: Base -> Map Labels (under gray) -> ROW Mask (Gray) -> BD Green Boundary -> Priority Regions (Blue) -> Manual Bold Labels -> Flood Events
        map.createPane('tileLabelPane');
        map.getPane('tileLabelPane').style.zIndex = 250;
        map.createPane('maskPane');
        map.getPane('maskPane').style.zIndex = 300;
        map.createPane('boundaryPane');
        map.getPane('boundaryPane').style.zIndex = 350;
        map.createPane('priorityPane');
        map.getPane('priorityPane').style.zIndex = 400;
        map.createPane('boldLabelPane');
        map.getPane('boldLabelPane').style.zIndex = 500;
        map.createPane('floodPane');
        map.getPane('floodPane').style.zIndex = 650;

        // Base Map Labels (Under the gray overlay)
        var labels = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            pane: 'tileLabelPane'
        }).addTo(map);

        var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri World Imagery'
        });

        // --- TITLE OVERLAY ---
        var title = L.control({position: 'topright'});
        title.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'map-title');
            div.innerHTML = 'Bangladesh flood incidence and risk across the districts of Chattogram, Feni, Cumilla, Munshiganj, Tangail, and Narshingdi';
            return div;
        };
        title.addTo(map);

        // --- DATA STATE ---
        var priorityMapping = {
            "Chittagong": "Chattogram", "Feni": "Feni", "Comilla": "Cumilla",
            "Munshiganj": "Munshiganj", "Tangail": "Tangail", "Narsingdi": "Narshingdi"
        };
        var districtBounds = {};
        var counts = { "All other districts": 0 };
        Object.keys(priorityMapping).forEach(k => { counts[priorityMapping[k]] = 0; });

        // --- WORLD MASK (Rest of World overlay - light gray and transparent) ---
        fetch('../world_mask.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    pane: 'maskPane',
                    style: { fillColor: '#808080', color: 'none', fillOpacity: 0.15, interactive: false }
                }).addTo(map);
            });

        // --- BANGLADESH BOUNDARY (Light Green Tone Outside Priority) ---
        fetch('../bd_boundary.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    pane: 'boundaryPane',
                    style: { fillColor: '#90ee90', color: '#666', weight: 1.5, fillOpacity: 0.25, interactive: false }
                }).addTo(map);
            });

        // --- DHAKA CAPITAL MARKER (Bold Manual Label) ---
        var dhakaIcon = L.divIcon({ className: 'leaflet-tooltip capital-label', html: '★ DHAKA' });
        L.marker([23.8103, 90.4125], { icon: dhakaIcon, interactive: false, pane: 'boldLabelPane' }).addTo(map);

        // --- CONSOLIDATED CONTROL ---
        var customControl = L.control({position: 'topleft'});
        customControl.onAdd = function(map) {
            var div = L.DomUtil.create('div', 'unified-control info');
            div.innerHTML = '<b>Base Layers</b>' +
                '<div><input type="radio" name="base" id="base_map" checked> <label for="base_map">Map View</label></div>' +
                '<div><input type="radio" name="base" id="base_sat"> <label for="base_sat">Satellite View</label></div>' +
                '<b>Districts</b>' +
                '<div id="district_list"></div>' +
                '<button class="reset-btn" id="reset_zoom">Reset to Country Level</button>' +
                '<b>Severity Legend</b>' +
                '<div class="legend-item"><i style="background:#d73027"></i> High (2.0)</div>' +
                '<div class="legend-item"><i style="background:#fc8d59"></i> Moderate (1.5)</div>' +
                '<div class="legend-item"><i style="background:#fee08b"></i> Low (1.0)</div>' +
                '<div class="legend-item"><hr><i style="background:#add8e6"></i> Priority District</div>' +
                '<div class="legend-item"><i style="background:#90ee90; opacity: 0.25"></i> Other BD Districts</div>' +
                '<div class="legend-item"><span style="color:#d73027">★</span> Capital (Dhaka)</div>';
            
            setTimeout(() => {
                div.querySelector('#base_map').onclick = () => { map.removeLayer(satellite); map.addLayer(base); map.addLayer(labels); };
                div.querySelector('#base_sat').onclick = () => { map.removeLayer(base); map.removeLayer(labels); map.addLayer(satellite); };
                div.querySelector('#reset_zoom').onclick = () => { map.setView(initialView, initialZoom); };
            }, 0);
            return div;
        };
        customControl.addTo(map);

        function populateDistricts() {
            var list = document.getElementById('district_list');
            Object.keys(priorityMapping).sort().forEach(k => {
                var d = priorityMapping[k];
                var row = L.DomUtil.create('div', 'district-row', list);
                row.innerHTML = '<span class="district-name">' + d + ' (' + counts[d] + ')</span>' +
                                '<span class="zoom-icon" title="Zoom to ' + d + '">🔍</span>';
                row.querySelector('.zoom-icon').onclick = () => {
                    if (districtBounds[d]) map.fitBounds(districtBounds[d], { padding: [50, 50] });
                };
            });
            var other = L.DomUtil.create('div', 'district-row', list);
            other.innerHTML = '<span class="district-name">All other districts (' + counts["All other districts"] + ')</span>';
        }

        // --- FETCH DATA ---
        Promise.all([
            fetch('../priority_districts.geojson').then(r => r.json()),
            fetch('../bangladesh_floods.geojson').then(r => r.json())
        ]).then(function(results) {
            var districtsData = results[0];
            var floodsData = results[1];

            floodsData.features.forEach(f => {
                var d = priorityMapping[f.properties.ADM2_EN];
                if (d) counts[d]++; else counts["All other districts"]++;
            });

            L.geoJSON(districtsData, {
                pane: 'priorityPane',
                style: { fillColor: '#add8e6', weight: 2, color: '#fff', fillOpacity: 0.65 },
                interactive: false,
                onEachFeature: function(feature, layer) {
                    var d = priorityMapping[feature.properties.ADM2_EN];
                    districtBounds[d] = layer.getBounds();
                    var center = layer.getBounds().getCenter();
                    // Manual Bold Label ON TOP of all masks
                    L.marker(center, {
                        icon: L.divIcon({ className: 'leaflet-tooltip', html: '<b>' + d + '</b>' }),
                        interactive: false, pane: 'boldLabelPane'
                    }).addTo(map);
                }
            }).addTo(map);

            L.geoJSON(floodsData, {
                pane: 'floodPane',
                pointToLayer: function (feature, latlng) {
                    var sev = feature.properties.Severity;
                    var color = sev >= 2 ? "#d73027" : (sev >= 1.5 ? "#fc8d59" : "#fee08b");
                    var radius = sev >= 2 ? 10 : (sev >= 1.5 ? 8 : 6);
                    return L.circleMarker(latlng, {
                        radius: radius, fillColor: color, color: "#fff", weight: 1.5, fillOpacity: 1
                    });
                },
                onEachFeature: function(feature, layer) {
                    var p = feature.properties;
                    layer.bindPopup("<b>Flood Event</b><br>District: " + (priorityMapping[p.ADM2_EN] || p.ADM2_EN) + "<br>Cause: "+p.MainCause+"<br>Severity: "+p.Severity+"<br>Began: "+p.Began);
                }
            }).addTo(map);

            populateDistricts();
        });

        // --- LEGEND ---
        var legend = L.control({position: 'bottomright'});
        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'info legend');
            div.innerHTML += '<b>Severity Legend</b><br>';
            div.innerHTML += '<i style="background:#d73027"></i> High (2.0)<br>';
            div.innerHTML += '<i style="background:#fc8d59"></i> Moderate (1.5)<br>';
            div.innerHTML += '<i style="background:#fee08b"></i> Low (1.0)<br>';
            div.innerHTML += '<hr><i style="background:#add8e6"></i> Priority District<br>';
            div.innerHTML += '<span style="color:#d73027">★</span> Capital (Dhaka)';
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>
