<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map | FloodKit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --primary: #0d9488;
      --primary-hover: #0f766e;
      --bg: #ffffff;
      --bg-card: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Consistent Navigation Bar */
    .nav-container {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 1000;
    }

    nav {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0.75rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      font-weight: 800;
      font-size: 1.25rem;
      color: var(--primary);
      text-decoration: none;
      letter-spacing: -0.025em;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--text);
      font-size: 0.875rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--primary); }
    .nav-links a.active { color: var(--primary); font-weight: 600; }

    #map {
      flex: 1;
      width: 100%;
      z-index: 1;
    }

    .map-header {
      padding: 1rem 2rem;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
    }

    .map-header h1 {
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: -0.025em;
    }

    /* Custom Leaflet Tooltip & Popup */
    .leaflet-popup-content-wrapper { border-radius: 0.5rem; }
    .leaflet-popup-content { font-family: 'Inter', sans-serif; font-size: 0.875rem; }
  </style>
</head>
<body>

  <div class="nav-container">
    <nav>
      <a href="../index.html" class="brand">FloodKit</a>
      <div class="nav-links">
        <a href="../index.html">Home</a>
        <a href="flood-incidence-and-risk-across-priority-districts.html" class="active">Map</a>
        <a href="../flood_analytics.html">Charts</a>
        <a href="../map-visualizer.html">CSV App</a>
      </div>
    </nav>
  </div>

  <div class="map-header">
    <h1>Priority Districts: Flood Incidence & Risk</h1>
  </div>

  <div id="map"></div>

  <script>
    const map = L.map('map').setView([23.8103, 90.4125], 7);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
    }).addTo(map);

    // Add marker for Dhaka
    L.marker([23.8103, 90.4125]).addTo(map)
      .bindPopup('<b>Dhaka</b><br>Capital of Bangladesh')
      .openPopup();

    // Data for priority districts (Simplified for this example, usually loaded from GeoJSON)
    const priorityDistricts = [
      { name: "Chattogram", coords: [22.3569, 91.7832], risk: "High" },
      { name: "Feni", coords: [23.0159, 91.3976], risk: "Very High" },
      { name: "Cumilla", coords: [23.4607, 91.1809], risk: "High" },
      { name: "Munshiganj", coords: [23.5422, 90.5305], risk: "Moderate" },
      { name: "Tangail", coords: [24.2513, 89.9167], risk: "High" },
      { name: "Narshingdi", coords: [23.9229, 90.7177], risk: "Moderate" }
    ];

    priorityDistricts.forEach(d => {
      L.circleMarker(d.coords, {
        radius: 10,
        fillColor: d.risk === "Very High" ? "#ef4444" : d.risk === "High" ? "#f97316" : "#eab308",
        color: "#fff",
        weight: 1,
        opacity: 1,
        fillOpacity: 0.8
      }).addTo(map).bindPopup(`<b>${d.name}</b><br>Flood Risk: ${d.risk}`);
    });
  </script>
</body>
</html>
