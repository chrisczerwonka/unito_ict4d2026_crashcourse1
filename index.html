<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map of Bangladesh</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        // Initialize the map and set its view to Bangladesh (centered)
        var map = L.map('map').setView([23.6850, 90.3563], 7);

        // Add an OpenStreetMap tile layer
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        // Priority districts to color
        var priorityDistricts = [
            'CHATTOGRAM', 'CHITTAGONG',
            'FENI',
            'CUMILLA', 'COMILLA',
            'MUNSHIGANJ',
            'TANGAIL',
            'NARSHINGDI', 'NARSINGDI'
        ];

        // Style for the GeoJSON layer
        function style(feature) {
            if (!feature.properties || !feature.properties.ADM2_EN) return {
                fillColor: 'none',
                weight: 1,
                opacity: 1,
                color: '#ccc',
                fillOpacity: 0
            };
            
            var districtName = feature.properties.ADM2_EN.toUpperCase();
            var isPriority = priorityDistricts.includes(districtName);
            
            return {
                fillColor: isPriority ? '#ff7800' : 'none',
                weight: 1,
                opacity: 1,
                color: isPriority ? 'black' : '#ccc',
                fillOpacity: isPriority ? 0.7 : 0
            };
        }

        // Fetch and add the GeoJSON layer
        fetch('https://raw.githubusercontent.com/nuhil/bangladesh-geocode/master/geojson/districts.geojson')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: style,
                    onEachFeature: function (feature, layer) {
                        if (feature.properties && feature.properties.ADM2_EN) {
                            layer.bindPopup(feature.properties.ADM2_EN);
                        }
                    }
                }).addTo(map);
            });

        // Add a marker for Dhaka, the capital
        var marker = L.marker([23.8103, 90.4125]).addTo(map);
        marker.bindPopup("<b>Dhaka</b><br>Capital of Bangladesh").openPopup();
    </script>
</body>
</html>
