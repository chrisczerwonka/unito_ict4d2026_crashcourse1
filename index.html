<!DOCTYPE html>
<html>
<head>
    <title>Bangladesh Flood Analysis - Priority Districts</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; background: #222; }
        .info { padding: 6px 8px; font: 14px/16px Arial, Helvetica, sans-serif; background: white; background: rgba(255,255,255,0.9); box-shadow: 0 0 15px rgba(0,0,0,0.2); border-radius: 5px; }
        .legend { line-height: 24px; color: #333; background: white; padding: 10px; border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.2); }
        .legend i { width: 20px; height: 20px; float: left; margin-right: 10px; opacity: 0.8; border: 1px solid #999; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script>
        // Initialize map centered on Bangladesh
        var map = L.map('map').setView([23.6850, 90.3563], 7);

        // Create a custom pane for flood events to ensure they stay on top
        map.createPane('floodPane');
        map.getPane('floodPane').style.zIndex = 650; // Higher than standard overlay pane
        map.getPane('floodPane').style.pointerEvents = 'none'; // Allow clicks to pass through if needed, but we want them clickable

        // Dark base map with English labels
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);

        // Styling for NON-priority districts
        function styleOtherDistricts(feature) {
            return {
                fillColor: '#006d2c',
                weight: 1.5,
                opacity: 1,
                color: '#fff',
                fillOpacity: 0.6
            };
        }

        // Styling for priority districts
        function stylePriorityDistricts(feature) {
            return {
                fillColor: '#ff7800',
                weight: 3,
                opacity: 1,
                color: '#fff',
                fillOpacity: 0.85
            };
        }

        // 1. Load Background Districts
        fetch('other_districts.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, { style: styleOtherDistricts }).addTo(map);
            });

        // 2. Load Priority Districts
        fetch('priority_districts.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: stylePriorityDistricts,
                    onEachFeature: function(feature, layer) {
                        layer.bindPopup("<b>Priority District:</b> " + feature.properties.ADM2_EN);
                    }
                }).addTo(map);
            });

        // 3. Load Flood Events (Using custom pane to keep them in front)
        fetch('bangladesh_floods.geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    pane: 'floodPane',
                    pointToLayer: function (feature, latlng) {
                        return L.circleMarker(latlng, {
                            radius: 10,
                            fillColor: "#ff0000",
                            color: "#fff",
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 1,
                            interactive: true // Ensure they are clickable
                        });
                    },
                    onEachFeature: function(feature, layer) {
                        var props = feature.properties;
                        var popupContent = "<div style='font-family: Arial;'>" +
                                         "<h3 style='margin:0 0 10px 0;'>Flood Event</h3>" +
                                         "<b>Location:</b> Bangladesh<br>" +
                                         "<b>Main Cause:</b> " + props.MainCause + "<br>" +
                                         "<b>Severity:</b> " + props.Severity + "<br>" +
                                         "<b>Dates:</b> " + props.Began + " to " + props.Ended + "<br>" +
                                         "<b>Displaced:</b> " + (props.Displaced || "N/A") +
                                         "</div>";
                        layer.bindPopup(popupContent);
                    }
                }).addTo(map);
            });

        // Legend
        var legend = L.control({position: 'bottomright'});
        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'info legend'),
                grades = ["Priority Districts", "Bangladesh Territory", "Flood Event Point (Clickable)"],
                colors = ["#ff7800", "#006d2c", "#ff0000"];

            for (var i = 0; i < grades.length; i++) {
                div.innerHTML +=
                    '<i style="background:' + colors[i] + '"></i> ' +
                    grades[i] + '<br>';
            }
            return div;
        };
        legend.addTo(map);

    </script>
</body>
</html>
